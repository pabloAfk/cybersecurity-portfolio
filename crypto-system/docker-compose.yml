version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto_postgres
    environment:
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass_2024
      POSTGRES_DB: crypto_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_user -d crypto_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: crypto_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://crypto_user:crypto_pass_2024@postgres:5432/crypto_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkeychangeinproduction}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crypto_network
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  crypto_network:
    driver: bridge

volumes:
  postgres_data:
